{
  "$schema": "https://json-schema.org/draft/2020-12/schema",
  "$id": "https://openpipestress.org/schemas/adapter_framework.schema.yaml",
  "title": "OpenPipeStress Adapter Framework Contract",
  "description": "Strict JSON syntax schema for the DEL-10-02 format-neutral import/export adapter framework. The contract defines adapter declaration, validation planning, diagnostics, provenance, privacy, checksum/audit references, and contribution-review boundaries without choosing concrete external formats, public transport, runtime plugin loading, CI provider, release matrix, or local FEA package behavior.",
  "type": "object",
  "additionalProperties": false,
  "required": [
    "schema_version",
    "deliverable_id",
    "package_id",
    "scope_item",
    "objective",
    "framework_status",
    "tbd_decisions",
    "adapter_declaration",
    "validation_plan",
    "operation_result"
  ],
  "properties": {
    "schema_version": {
      "type": "string",
      "pattern": "^[0-9]+\\.[0-9]+\\.[0-9]+$"
    },
    "deliverable_id": {
      "const": "DEL-10-02"
    },
    "package_id": {
      "const": "PKG-10"
    },
    "scope_item": {
      "const": "SOW-030"
    },
    "objective": {
      "const": "OBJ-009"
    },
    "framework_status": {
      "$ref": "#/$defs/FrameworkStatus"
    },
    "tbd_decisions": {
      "$ref": "#/$defs/TbdDecisions"
    },
    "adapter_declaration": {
      "$ref": "#/$defs/AdapterDeclaration"
    },
    "validation_plan": {
      "$ref": "#/$defs/ValidationPlan"
    },
    "operation_result": {
      "$ref": "#/$defs/AdapterOperationResult"
    }
  },
  "$defs": {
    "AdapterCapability": {
      "type": "string",
      "enum": [
        "import_model",
        "export_model",
        "import_library",
        "export_library",
        "import_rule_pack_ref",
        "export_results",
        "validate_payload",
        "contribution_review",
        "TBD"
      ]
    },
    "AdapterDeclaration": {
      "type": "object",
      "additionalProperties": false,
      "required": [
        "adapter_id",
        "adapter_name",
        "adapter_kind",
        "format_status",
        "capabilities",
        "operation_boundary",
        "provenance",
        "privacy",
        "no_bypass_controls",
        "professional_boundary"
      ],
      "properties": {
        "adapter_id": {
          "type": "string",
          "pattern": "^ops\\.adapter\\.[a-z0-9_]+$"
        },
        "adapter_name": {
          "type": "string",
          "minLength": 1
        },
        "adapter_kind": {
          "type": "string",
          "enum": [
            "invented_fixture",
            "format_neutral_contract",
            "private_local_adapter",
            "public_review_candidate",
            "TBD"
          ]
        },
        "format_status": {
          "type": "string",
          "const": "TBD"
        },
        "capabilities": {
          "type": "array",
          "minItems": 1,
          "items": {
            "$ref": "#/$defs/AdapterCapability"
          },
          "contains": {
            "enum": [
              "import_model",
              "export_model",
              "validate_payload",
              "contribution_review"
            ]
          }
        },
        "operation_boundary": {
          "$ref": "#/$defs/OperationBoundary"
        },
        "provenance": {
          "$ref": "#/$defs/Provenance"
        },
        "privacy": {
          "$ref": "#/$defs/PrivacyContext"
        },
        "no_bypass_controls": {
          "$ref": "#/$defs/NoBypassControls"
        },
        "professional_boundary": {
          "$ref": "#/$defs/ProfessionalBoundary"
        }
      }
    },
    "AdapterOperationResult": {
      "type": "object",
      "additionalProperties": false,
      "required": [
        "operation_id",
        "operation_class",
        "parse_status",
        "validation_plan_ref",
        "diagnostics",
        "privacy",
        "provenance",
        "checksums",
        "audit_manifest_refs",
        "result_envelope_ref",
        "professional_boundary"
      ],
      "properties": {
        "operation_id": {
          "type": "string",
          "minLength": 1
        },
        "operation_class": {
          "type": "string",
          "enum": [
            "import",
            "export",
            "validate",
            "contribution_review",
            "TBD"
          ]
        },
        "parse_status": {
          "type": "string",
          "enum": [
            "not_parsed_by_framework",
            "syntactic_parse_succeeded",
            "syntactic_parse_failed",
            "TBD"
          ]
        },
        "validation_plan_ref": {
          "$ref": "#/$defs/Reference"
        },
        "diagnostics": {
          "type": "array",
          "items": {
            "$ref": "#/$defs/Diagnostic"
          }
        },
        "privacy": {
          "$ref": "#/$defs/PrivacyContext"
        },
        "provenance": {
          "$ref": "#/$defs/Provenance"
        },
        "checksums": {
          "type": "array",
          "items": {
            "$ref": "#/$defs/ChecksumRef"
          }
        },
        "audit_manifest_refs": {
          "type": "array",
          "items": {
            "$ref": "#/$defs/Reference"
          }
        },
        "result_envelope_ref": {
          "$ref": "#/$defs/ResultEnvelopeRef"
        },
        "professional_boundary": {
          "$ref": "#/$defs/ProfessionalBoundary"
        }
      }
    },
    "ChecksumRef": {
      "type": "object",
      "additionalProperties": false,
      "required": [
        "algorithm",
        "canonicalization",
        "payload_ref",
        "value"
      ],
      "properties": {
        "algorithm": {
          "type": "string",
          "enum": [
            "sha256",
            "sha512",
            "TBD"
          ]
        },
        "canonicalization": {
          "type": "string",
          "enum": [
            "JCS-compatible-json",
            "none",
            "TBD"
          ]
        },
        "payload_ref": {
          "$ref": "#/$defs/Reference"
        },
        "value": {
          "type": "string",
          "minLength": 1
        }
      }
    },
    "Diagnostic": {
      "type": "object",
      "additionalProperties": false,
      "required": [
        "code",
        "class",
        "severity",
        "source",
        "affected_object",
        "message",
        "remediation",
        "provenance"
      ],
      "properties": {
        "code": {
          "type": "string",
          "minLength": 1
        },
        "class": {
          "type": "string",
          "enum": [
            "PROVENANCE_WARNING",
            "IP_BOUNDARY_WARNING",
            "UNIT_WARNING",
            "PRIVACY_WARNING",
            "EXPORT_BLOCKING",
            "ADAPTER_BLOCKING",
            "RULE_CHECK_BLOCKING",
            "ASSUMPTION_WARNING",
            "TBD"
          ]
        },
        "severity": {
          "type": "string",
          "enum": [
            "info",
            "warning",
            "blocking",
            "quarantine"
          ]
        },
        "source": {
          "$ref": "#/$defs/Reference"
        },
        "affected_object": {
          "$ref": "#/$defs/Reference"
        },
        "message": {
          "type": "string",
          "minLength": 1
        },
        "remediation": {
          "type": "string",
          "minLength": 1
        },
        "provenance": {
          "$ref": "#/$defs/Provenance"
        }
      }
    },
    "FrameworkStatus": {
      "type": "object",
      "additionalProperties": false,
      "required": [
        "interface_kind",
        "external_format_list",
        "public_transport_protocol",
        "endpoint_syntax",
        "adapter_execution_model",
        "plugin_runtime",
        "permission_grant_persistence",
        "physical_project_container",
        "local_fea_package_format",
        "redaction_workflow",
        "ci_provider",
        "release_matrix"
      ],
      "properties": {
        "interface_kind": {
          "const": "schema_first_format_neutral_adapter_framework"
        },
        "external_format_list": {
          "const": "TBD"
        },
        "public_transport_protocol": {
          "const": "TBD"
        },
        "endpoint_syntax": {
          "const": "TBD"
        },
        "adapter_execution_model": {
          "const": "TBD"
        },
        "plugin_runtime": {
          "const": "TBD"
        },
        "permission_grant_persistence": {
          "const": "TBD"
        },
        "physical_project_container": {
          "const": "TBD"
        },
        "local_fea_package_format": {
          "const": "TBD"
        },
        "redaction_workflow": {
          "const": "TBD"
        },
        "ci_provider": {
          "const": "TBD"
        },
        "release_matrix": {
          "const": "TBD"
        }
      }
    },
    "NoBypassControls": {
      "type": "object",
      "additionalProperties": false,
      "required": [
        "must_use_public_api_boundary",
        "must_use_unit_validation",
        "must_preserve_provenance",
        "must_preserve_redistribution_review",
        "must_preserve_privacy_classification",
        "must_screen_protected_content",
        "must_preserve_diagnostics",
        "must_preserve_rule_pack_sandbox",
        "must_preserve_persistence_hash_controls",
        "must_preserve_report_controls",
        "must_preserve_human_acceptance_boundary",
        "must_not_execute_arbitrary_code",
        "must_not_access_network",
        "must_not_choose_filesystem_roots",
        "must_not_claim_code_compliance",
        "must_not_transmit_private_data_by_default"
      ],
      "properties": {
        "must_use_public_api_boundary": {
          "const": true
        },
        "must_use_unit_validation": {
          "const": true
        },
        "must_preserve_provenance": {
          "const": true
        },
        "must_preserve_redistribution_review": {
          "const": true
        },
        "must_preserve_privacy_classification": {
          "const": true
        },
        "must_screen_protected_content": {
          "const": true
        },
        "must_preserve_diagnostics": {
          "const": true
        },
        "must_preserve_rule_pack_sandbox": {
          "const": true
        },
        "must_preserve_persistence_hash_controls": {
          "const": true
        },
        "must_preserve_report_controls": {
          "const": true
        },
        "must_preserve_human_acceptance_boundary": {
          "const": true
        },
        "must_not_execute_arbitrary_code": {
          "const": true
        },
        "must_not_access_network": {
          "const": true
        },
        "must_not_choose_filesystem_roots": {
          "const": true
        },
        "must_not_claim_code_compliance": {
          "const": true
        },
        "must_not_transmit_private_data_by_default": {
          "const": true
        }
      }
    },
    "OperationBoundary": {
      "type": "object",
      "additionalProperties": false,
      "required": [
        "api_operation_id",
        "operation_category",
        "mutability",
        "transport"
      ],
      "properties": {
        "api_operation_id": {
          "type": "string",
          "enum": [
            "ops.model.import",
            "ops.model.export",
            "ops.export.job",
            "ops.validation.job",
            "TBD"
          ]
        },
        "operation_category": {
          "type": "string",
          "enum": [
            "command",
            "query",
            "job",
            "result_envelope",
            "validation_test",
            "no_bypass"
          ]
        },
        "mutability": {
          "type": "string",
          "enum": [
            "read_only",
            "mutating",
            "long_running",
            "metadata_only"
          ]
        },
        "transport": {
          "const": "TBD"
        }
      }
    },
    "PrivacyContext": {
      "type": "object",
      "additionalProperties": false,
      "required": [
        "classification",
        "local_first",
        "telemetry_allowed",
        "export_review_required",
        "private_payload_redacted"
      ],
      "properties": {
        "classification": {
          "type": "string",
          "enum": [
            "public_permissive_reviewed",
            "private_local_only",
            "protected_suspected",
            "export_review_required",
            "TBD"
          ]
        },
        "local_first": {
          "const": true
        },
        "telemetry_allowed": {
          "const": false
        },
        "export_review_required": {
          "type": "boolean"
        },
        "private_payload_redacted": {
          "type": "boolean"
        }
      }
    },
    "ProfessionalBoundary": {
      "type": "object",
      "additionalProperties": false,
      "required": [
        "human_review_required",
        "mechanics_solve_distinct",
        "user_rule_check_distinct",
        "software_makes_compliance_claim",
        "software_makes_certification_claim",
        "software_makes_sealing_claim",
        "software_makes_approval_claim",
        "software_makes_security_certification_claim"
      ],
      "properties": {
        "human_review_required": {
          "const": true
        },
        "mechanics_solve_distinct": {
          "const": true
        },
        "user_rule_check_distinct": {
          "const": true
        },
        "software_makes_compliance_claim": {
          "const": false
        },
        "software_makes_certification_claim": {
          "const": false
        },
        "software_makes_sealing_claim": {
          "const": false
        },
        "software_makes_approval_claim": {
          "const": false
        },
        "software_makes_security_certification_claim": {
          "const": false
        }
      }
    },
    "Provenance": {
      "type": "object",
      "additionalProperties": false,
      "required": [
        "source_name",
        "source_location",
        "source_license",
        "contributor",
        "contributor_certification",
        "redistribution_status",
        "review_status"
      ],
      "properties": {
        "source_name": {
          "type": "string",
          "minLength": 1
        },
        "source_location": {
          "type": "string",
          "minLength": 1
        },
        "source_license": {
          "type": "string",
          "minLength": 1
        },
        "contributor": {
          "type": "string",
          "minLength": 1
        },
        "contributor_certification": {
          "type": "string",
          "minLength": 1
        },
        "redistribution_status": {
          "type": "string",
          "enum": [
            "public_permissive",
            "private_only",
            "unknown",
            "protected_suspected",
            "TBD"
          ]
        },
        "review_status": {
          "type": "string",
          "enum": [
            "accepted",
            "needs_review",
            "quarantined",
            "rejected",
            "TBD"
          ]
        }
      }
    },
    "Reference": {
      "type": "object",
      "additionalProperties": false,
      "required": [
        "ref_type",
        "ref_id"
      ],
      "properties": {
        "ref_type": {
          "type": "string",
          "enum": [
            "schema",
            "adapter",
            "operation",
            "payload",
            "diagnostic",
            "audit_manifest",
            "result_envelope",
            "TBD"
          ]
        },
        "ref_id": {
          "type": "string",
          "minLength": 1
        }
      }
    },
    "ResultEnvelopeRef": {
      "type": "object",
      "additionalProperties": false,
      "required": [
        "schema_ref",
        "compatibility",
        "ref"
      ],
      "properties": {
        "schema_ref": {
          "const": "schemas/results.schema.yaml"
        },
        "compatibility": {
          "const": "schema_first_json_result_envelope"
        },
        "ref": {
          "$ref": "#/$defs/Reference"
        }
      }
    },
    "TbdDecisions": {
      "type": "object",
      "additionalProperties": false,
      "required": [
        "external_format_list",
        "public_transport_protocol",
        "endpoint_syntax",
        "adapter_execution_model",
        "plugin_runtime",
        "permission_grant_persistence",
        "package_scripts",
        "ci_provider",
        "release_matrix",
        "physical_project_container",
        "local_fea_package_format",
        "redaction_workflow"
      ],
      "properties": {
        "external_format_list": {
          "const": "TBD"
        },
        "public_transport_protocol": {
          "const": "TBD"
        },
        "endpoint_syntax": {
          "const": "TBD"
        },
        "adapter_execution_model": {
          "const": "TBD"
        },
        "plugin_runtime": {
          "const": "TBD"
        },
        "permission_grant_persistence": {
          "const": "TBD"
        },
        "package_scripts": {
          "const": "TBD"
        },
        "ci_provider": {
          "const": "TBD"
        },
        "release_matrix": {
          "const": "TBD"
        },
        "physical_project_container": {
          "const": "TBD"
        },
        "local_fea_package_format": {
          "const": "TBD"
        },
        "redaction_workflow": {
          "const": "TBD"
        }
      }
    },
    "ValidationPlan": {
      "type": "object",
      "additionalProperties": false,
      "required": [
        "syntactic_parse",
        "schema_validation",
        "unit_validation",
        "dimension_validation",
        "provenance_validation",
        "redistribution_review",
        "privacy_classification",
        "protected_content_screening",
        "mechanics_readiness",
        "rule_check_readiness",
        "export_review",
        "human_review_required"
      ],
      "properties": {
        "syntactic_parse": {
          "type": "string",
          "enum": [
            "not_performed_by_framework",
            "required_before_domain_acceptance",
            "TBD"
          ]
        },
        "schema_validation": {
          "const": "required"
        },
        "unit_validation": {
          "const": "required"
        },
        "dimension_validation": {
          "const": "required"
        },
        "provenance_validation": {
          "const": "required"
        },
        "redistribution_review": {
          "const": "required"
        },
        "privacy_classification": {
          "const": "required"
        },
        "protected_content_screening": {
          "const": "required"
        },
        "mechanics_readiness": {
          "type": "string",
          "enum": [
            "required_for_solve",
            "not_applicable",
            "TBD"
          ]
        },
        "rule_check_readiness": {
          "type": "string",
          "enum": [
            "required_for_rule_check",
            "not_applicable",
            "TBD"
          ]
        },
        "export_review": {
          "type": "string",
          "enum": [
            "required_before_shared_payload",
            "not_applicable",
            "TBD"
          ]
        },
        "human_review_required": {
          "const": true
        }
      }
    }
  }
}
