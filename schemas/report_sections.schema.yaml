{
  "$schema": "https://json-schema.org/draft/2020-12/schema",
  "$id": "https://openpipestress.org/schemas/report_sections.schema.yaml",
  "title": "OpenPipeStress Report Sections Schema",
  "description": "Strict JSON syntax schema for report-facing warnings, assumptions, user-supplied values, provenance notes, limitations, unresolved TBDs, and human-review-needed findings. This schema does not render final reports or make professional/code-compliance claims.",
  "type": "object",
  "additionalProperties": false,
  "required": [
    "schema_version",
    "deliverable_id",
    "package_id",
    "scope_item",
    "objectives",
    "report_renderer_status",
    "report_sections"
  ],
  "properties": {
    "schema_version": {
      "type": "string",
      "pattern": "^[0-9]+\\.[0-9]+\\.[0-9]+$"
    },
    "deliverable_id": {
      "const": "DEL-08-03"
    },
    "package_id": {
      "const": "PKG-08"
    },
    "scope_item": {
      "const": "SOW-024"
    },
    "objectives": {
      "type": "array",
      "minItems": 2,
      "contains": {
        "enum": [
          "OBJ-007",
          "OBJ-011"
        ]
      },
      "items": {
        "type": "string",
        "enum": [
          "OBJ-007",
          "OBJ-011"
        ]
      }
    },
    "report_renderer_status": {
      "$ref": "#/$defs/ReportRendererStatus"
    },
    "report_sections": {
      "$ref": "#/$defs/ReportSectionEnvelope"
    }
  },
  "$defs": {
    "AnalysisStatusDisclosure": {
      "type": "object",
      "additionalProperties": false,
      "required": [
        "status",
        "source",
        "affected_object",
        "explanation",
        "human_review_required"
      ],
      "properties": {
        "status": {
          "$ref": "#/$defs/AnalysisStatus"
        },
        "source": {
          "$ref": "#/$defs/Reference"
        },
        "affected_object": {
          "$ref": "#/$defs/Reference"
        },
        "explanation": {
          "type": "string",
          "minLength": 1
        },
        "human_review_required": {
          "const": true
        },
        "human_acceptance_ref": {
          "$ref": "#/$defs/Reference"
        }
      }
    },
    "AnalysisStatus": {
      "type": "string",
      "description": "Automatic software-emitted statuses allowed in report sections. Human acceptance is external and reference-only.",
      "enum": [
        "MODEL_INCOMPLETE",
        "MECHANICS_SOLVED",
        "RULE_INPUTS_INCOMPLETE",
        "USER_RULE_CHECKED",
        "USER_RULE_FAILED",
        "HUMAN_REVIEW_REQUIRED"
      ]
    },
    "Assumption": {
      "type": "object",
      "additionalProperties": false,
      "required": [
        "assumption_id",
        "owner",
        "source",
        "affected_scope",
        "statement",
        "review_status",
        "effect",
        "provenance"
      ],
      "properties": {
        "assumption_id": {
          "type": "string",
          "minLength": 1
        },
        "owner": {
          "type": "string",
          "minLength": 1
        },
        "source": {
          "$ref": "#/$defs/Reference"
        },
        "affected_scope": {
          "$ref": "#/$defs/Reference"
        },
        "statement": {
          "type": "string",
          "minLength": 1
        },
        "review_status": {
          "type": "string",
          "enum": [
            "pending",
            "accepted",
            "rejected",
            "superseded",
            "TBD"
          ]
        },
        "expiration_or_re_review_trigger": {
          "type": "string"
        },
        "effect": {
          "$ref": "#/$defs/ReportEffect"
        },
        "provenance": {
          "$ref": "#/$defs/Provenance"
        }
      }
    },
    "Diagnostic": {
      "type": "object",
      "additionalProperties": false,
      "required": [
        "code",
        "class",
        "severity",
        "source",
        "affected_object",
        "message",
        "remediation",
        "provenance"
      ],
      "properties": {
        "code": {
          "type": "string",
          "minLength": 1
        },
        "class": {
          "type": "string",
          "enum": [
            "SOLVE_BLOCKING",
            "RULE_CHECK_BLOCKING",
            "PROVENANCE_WARNING",
            "ASSUMPTION_WARNING",
            "NONLINEAR_WARNING",
            "IP_BOUNDARY_WARNING",
            "UNIT_WARNING",
            "REPORT_BLOCKING",
            "TBD"
          ]
        },
        "severity": {
          "type": "string",
          "enum": [
            "info",
            "warning",
            "blocking"
          ]
        },
        "source": {
          "$ref": "#/$defs/Reference"
        },
        "affected_object": {
          "$ref": "#/$defs/Reference"
        },
        "message": {
          "type": "string",
          "minLength": 1
        },
        "remediation": {
          "type": "string",
          "minLength": 1
        },
        "provenance": {
          "$ref": "#/$defs/Provenance"
        }
      }
    },
    "DimensionId": {
      "type": "string",
      "enum": [
        "dimensionless",
        "length",
        "angle",
        "force",
        "moment",
        "stress",
        "ratio",
        "time",
        "temperature",
        "pressure",
        "TBD"
      ]
    },
    "Limitation": {
      "type": "object",
      "additionalProperties": false,
      "required": [
        "limitation_id",
        "source",
        "affected_scope",
        "statement",
        "effect",
        "provenance"
      ],
      "properties": {
        "limitation_id": {
          "type": "string",
          "minLength": 1
        },
        "source": {
          "$ref": "#/$defs/Reference"
        },
        "affected_scope": {
          "$ref": "#/$defs/Reference"
        },
        "statement": {
          "type": "string",
          "minLength": 1
        },
        "effect": {
          "$ref": "#/$defs/ReportEffect"
        },
        "provenance": {
          "$ref": "#/$defs/Provenance"
        }
      }
    },
    "PrivacyClassification": {
      "type": "string",
      "enum": [
        "public_metadata",
        "invented_public_example",
        "private_project_data",
        "private_rule_pack_data",
        "protected_suspected",
        "redacted",
        "TBD"
      ]
    },
    "ProfessionalBoundary": {
      "type": "object",
      "additionalProperties": false,
      "required": [
        "human_review_required",
        "software_makes_compliance_claim",
        "software_makes_certification_claim",
        "software_makes_sealing_claim",
        "software_makes_approval_claim",
        "software_makes_authentication_claim"
      ],
      "properties": {
        "human_review_required": {
          "const": true
        },
        "software_makes_compliance_claim": {
          "const": false
        },
        "software_makes_certification_claim": {
          "const": false
        },
        "software_makes_sealing_claim": {
          "const": false
        },
        "software_makes_approval_claim": {
          "const": false
        },
        "software_makes_authentication_claim": {
          "const": false
        }
      }
    },
    "Provenance": {
      "type": "object",
      "additionalProperties": false,
      "required": [
        "source_name",
        "source_location",
        "source_license",
        "contributor",
        "contributor_certification",
        "redistribution_status",
        "review_status",
        "privacy_classification"
      ],
      "properties": {
        "source_name": {
          "type": "string",
          "minLength": 1
        },
        "source_location": {
          "type": "string",
          "minLength": 1
        },
        "source_license": {
          "type": "string",
          "minLength": 1
        },
        "contributor": {
          "type": "string",
          "minLength": 1
        },
        "contributor_certification": {
          "type": "string",
          "minLength": 1
        },
        "redistribution_status": {
          "type": "string",
          "enum": [
            "public_permissive",
            "private_only",
            "unknown",
            "protected_suspected",
            "invented_non_engineering_example",
            "TBD"
          ]
        },
        "review_status": {
          "type": "string",
          "enum": [
            "pending",
            "accepted",
            "rejected",
            "quarantined",
            "TBD"
          ]
        },
        "privacy_classification": {
          "$ref": "#/$defs/PrivacyClassification"
        }
      }
    },
    "Reference": {
      "type": "object",
      "additionalProperties": false,
      "required": [
        "ref_type",
        "ref_id"
      ],
      "properties": {
        "ref_type": {
          "type": "string",
          "minLength": 1
        },
        "ref_id": {
          "type": "string",
          "minLength": 1
        }
      }
    },
    "ReportEffect": {
      "type": "object",
      "additionalProperties": false,
      "required": [
        "mechanics_solve",
        "user_rule_check",
        "report_completeness",
        "human_review"
      ],
      "properties": {
        "mechanics_solve": {
          "type": "string",
          "enum": [
            "none",
            "qualifies_results",
            "blocks_results",
            "TBD"
          ]
        },
        "user_rule_check": {
          "type": "string",
          "enum": [
            "none",
            "qualifies_results",
            "blocks_results",
            "TBD"
          ]
        },
        "report_completeness": {
          "type": "string",
          "enum": [
            "complete",
            "qualified",
            "incomplete",
            "TBD"
          ]
        },
        "human_review": {
          "type": "string",
          "enum": [
            "not_required_by_this_item",
            "recommended",
            "required",
            "TBD"
          ]
        }
      }
    },
    "ReportRendererStatus": {
      "type": "object",
      "additionalProperties": false,
      "required": [
        "report_section_contract",
        "full_report_renderer",
        "final_template_layout",
        "gui_presentation",
        "cli_runtime",
        "api_transport",
        "adapter_behavior",
        "private_redaction_export_controls",
        "release_template_integration"
      ],
      "properties": {
        "report_section_contract": {
          "const": "schema_first_report_section_records"
        },
        "full_report_renderer": {
          "const": "TBD"
        },
        "final_template_layout": {
          "const": "TBD"
        },
        "gui_presentation": {
          "const": "TBD"
        },
        "cli_runtime": {
          "const": "TBD"
        },
        "api_transport": {
          "const": "TBD"
        },
        "adapter_behavior": {
          "const": "TBD"
        },
        "private_redaction_export_controls": {
          "const": "TBD"
        },
        "release_template_integration": {
          "const": "TBD"
        }
      }
    },
    "ReportSectionEnvelope": {
      "type": "object",
      "additionalProperties": false,
      "required": [
        "report_section_id",
        "model_ref",
        "run_ref",
        "diagnostics",
        "analysis_status_disclosures",
        "provenance_notes",
        "user_supplied_values",
        "assumptions",
        "limitations",
        "unresolved_tbds",
        "professional_boundary"
      ],
      "properties": {
        "report_section_id": {
          "type": "string",
          "minLength": 1
        },
        "model_ref": {
          "$ref": "#/$defs/Reference"
        },
        "run_ref": {
          "$ref": "#/$defs/Reference"
        },
        "diagnostics": {
          "type": "array",
          "items": {
            "$ref": "#/$defs/Diagnostic"
          }
        },
        "analysis_status_disclosures": {
          "type": "array",
          "minItems": 1,
          "contains": {
            "required": [
              "status"
            ],
            "properties": {
              "status": {
                "const": "HUMAN_REVIEW_REQUIRED"
              }
            }
          },
          "items": {
            "$ref": "#/$defs/AnalysisStatusDisclosure"
          }
        },
        "provenance_notes": {
          "type": "array",
          "items": {
            "$ref": "#/$defs/Provenance"
          }
        },
        "user_supplied_values": {
          "type": "array",
          "items": {
            "$ref": "#/$defs/UserSuppliedValue"
          }
        },
        "assumptions": {
          "type": "array",
          "items": {
            "$ref": "#/$defs/Assumption"
          }
        },
        "limitations": {
          "type": "array",
          "items": {
            "$ref": "#/$defs/Limitation"
          }
        },
        "unresolved_tbds": {
          "type": "array",
          "items": {
            "$ref": "#/$defs/UnresolvedTbd"
          }
        },
        "professional_boundary": {
          "$ref": "#/$defs/ProfessionalBoundary"
        }
      }
    },
    "UnresolvedTbd": {
      "type": "object",
      "additionalProperties": false,
      "required": [
        "tbd_id",
        "affected_scope",
        "description",
        "review_needed"
      ],
      "properties": {
        "tbd_id": {
          "type": "string",
          "minLength": 1
        },
        "affected_scope": {
          "$ref": "#/$defs/Reference"
        },
        "description": {
          "type": "string",
          "minLength": 1
        },
        "review_needed": {
          "const": true
        }
      }
    },
    "UserSuppliedValue": {
      "type": "object",
      "additionalProperties": false,
      "required": [
        "value_id",
        "value_category",
        "source",
        "provenance",
        "privacy_classification",
        "required_for",
        "review_status",
        "missing_data_finding"
      ],
      "properties": {
        "value_id": {
          "type": "string",
          "minLength": 1
        },
        "value_category": {
          "type": "string",
          "enum": [
            "material_property",
            "component_property",
            "rule_pack_value",
            "load_input",
            "support_input",
            "owner_requirement",
            "report_metadata",
            "TBD"
          ]
        },
        "source": {
          "$ref": "#/$defs/Reference"
        },
        "quantity": {
          "$ref": "#/$defs/ValueQuantity"
        },
        "provenance": {
          "$ref": "#/$defs/Provenance"
        },
        "privacy_classification": {
          "$ref": "#/$defs/PrivacyClassification"
        },
        "required_for": {
          "type": "array",
          "minItems": 1,
          "items": {
            "type": "string",
            "enum": [
              "mechanics_solve",
              "user_rule_check",
              "reporting",
              "human_review"
            ]
          }
        },
        "review_status": {
          "type": "string",
          "enum": [
            "pending",
            "accepted",
            "rejected",
            "quarantined",
            "TBD"
          ]
        },
        "missing_data_finding": {
          "type": "boolean"
        }
      }
    },
    "ValueQuantity": {
      "type": "object",
      "additionalProperties": false,
      "required": [
        "magnitude",
        "unit",
        "dimension"
      ],
      "properties": {
        "magnitude": {
          "type": "number"
        },
        "unit": {
          "type": "string",
          "minLength": 1
        },
        "dimension": {
          "$ref": "#/$defs/DimensionId"
        }
      }
    }
  }
}
